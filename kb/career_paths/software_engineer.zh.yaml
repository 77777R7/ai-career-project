summary: Software engineers design, build, test, and maintain software systems that solve user or business problems.
related_majors:
  - Computer Science
  - Software Engineering
  - Data Science
  - Cognitive Systems
  - Statistics
daily_tasks:
  - Write and review code.
  - Debug software issues.
  - Design features or technical systems.
  - Collaborate with product, design, data, and engineering teammates.
best_fit_for:
  - Students who enjoy building things with code.
  - Students willing to practice programming fundamentals and debugging.
  - Students who like structured problem-solving and technical depth.
common_challenges:
  - Students need proof of building ability, not only course completion.
  - Interview preparation and project depth can take time.
reflection_questions:
  - Do you enjoy making a working system, even when debugging is frustrating?
  - Are you willing to practice fundamentals consistently?
support_strategies:
  - Start with a small app or automation project and explain the design decisions.
required_skills:
  - skill.programming_fundamentals
  - skill.sql
  - skill.data_storytelling
recommended_courses:
  - Intro programming
  - Data structures
  - Software design
  - Databases
high_school_preparation:
  - Build a small website, script, or app.
  - Join coding clubs or beginner hackathons if available.
university_preparation:
  - Build one small project that solves a real user problem.
  - Practice data structures gradually.
entry_level_roles:
  - Software Engineer Intern
  - Web Developer Intern
  - Backend Developer Intern
  - Junior Software Developer
