first_project_recommendation:
  project_id: project.canada_ai_workforce_policy_brief
  reason: A short policy brief lets the student show research, source judgment, and recommendation writing.
career_progression:
  entry_level:
    - Policy Analyst Intern
    - Research Assistant
  mid_level:
    - Policy Analyst
    - Program Analyst
  advanced:
    - Senior Policy Analyst
    - Policy Manager
salary_note: Policy roles vary by sector, employer, geography, and experience. Do not present outcomes as guaranteed.
risks_and_challenges:
  - Writing quality and source judgment matter as much as interest in public issues.
  - Students should avoid unsupported claims or legal advice.
misconceptions:
  - Policy work is not only opinions; it requires evidence, tradeoff analysis, and clear writing.
alternative_paths:
  - career_path.consultant
  - career_path.business_analyst
  - career_path.data_analyst
canadian_context:
