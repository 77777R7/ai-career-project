project_goal: Write a short evidence-backed policy brief about how AI may affect one Canadian workforce or education issue.
final_outputs:
  - policy_question
  - source_notes
  - option_comparison
  - policy_brief
steps:
  - step_number: 1
    title: Define the policy question
    objective: Choose one narrow AI workforce or education issue in Canada.
    estimated_time: 30 minutes
    required_tools:
      - Google Docs
    input_needed:
      - policy_interest
    instructions:
      - Pick one issue, stakeholder group, or sector.
      - Write one policy question that can be explored with public sources.
      - Avoid making legal or government advice claims.
    expected_output:
      type: text
      description: A 1-2 sentence policy question.
    completion_checklist:
      - Question is narrow.
      - Stakeholder or sector is named.
      - The project can use public sources.
    ai_help_prompt: Help the student narrow the policy question and avoid unsupported claims.
    review_rubric:
      clarity: 0-3
      feasibility: 0-3
      sourceability: 0-3
    common_mistakes:
      - Choosing a question that is too broad.
      - Treating policy opinion as evidence.
    next_step_trigger: After the question is defined, help the student collect official sources.
    related_action_id: action.define_project_question
    related_metric_ids:
      - metric.project_readiness
rubric:
  project_fit:
    description: The project should show research, source judgment, and recommendation writing.
  evidence_quality:
    description: The brief should separate evidence, assumptions, tradeoffs, and recommendations.
data_sources:
  - source.statcan_open_license
  - source.jobbank_career_planning
