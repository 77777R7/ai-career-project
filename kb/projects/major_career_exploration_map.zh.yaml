project_goal: Compare three possible majors and three related career paths, then write a short reflection on what to explore next.
final_outputs:
  - major_comparison_table
  - career_path_notes
  - reflection
steps:
  - step_number: 1
    title: Choose majors and paths to compare
    objective: Pick three majors or interest areas and three related career paths.
    estimated_time: 25 minutes
    required_tools:
      - Google Docs
      - Google Sheets
    input_needed:
      - target_majors
      - liked_subjects
      - career_interests
    instructions:
      - Choose three majors or subject areas you are curious about.
      - Choose up to three career paths that might connect to them.
      - Write one reason each option is worth exploring.
    expected_output:
      type: checklist
      description: Three majors or subject areas and three career paths to compare.
    completion_checklist:
      - At least two options are listed.
      - Each option has one reason.
      - The student is not forced to decide permanently.
    ai_help_prompt: Help the student compare options without making the decision for them.
    review_rubric:
      clarity: 0-3
      exploration_breadth: 0-3
      reflection_quality: 0-3
    common_mistakes:
      - Treating exploration as a final decision.
      - Comparing too many options at once.
    next_step_trigger: After options are listed, help the student identify one low-pressure next action.
    related_action_id: action.define_project_question
    related_metric_ids:
      - metric.career_clarity
      - metric.project_readiness
rubric:
  project_fit:
    description: The project should support exploration and reflection, not job-search pressure.
  evidence_quality:
    description: The final output should show what the student learned and what they will test next.
data_sources:
  - source.jobbank_career_planning
ai_support_level:
