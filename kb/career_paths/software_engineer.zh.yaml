first_project_recommendation:
  project_id: project.ai_student_growth_prd
  reason: Before building, the student can define a focused product problem and scope a small feature; a later technical build can extend it.
career_progression:
  entry_level:
    - Software Engineer Intern
    - Junior Software Developer
  mid_level:
    - Software Engineer
    - Full-stack Developer
  advanced:
    - Senior Software Engineer
    - Engineering Manager
salary_note: Compensation varies by employer, location, role type, and experience. Do not frame this path as a guaranteed outcome.
risks_and_challenges:
  - Entry-level competition can be high.
  - Students should test whether they enjoy sustained coding and debugging.
misconceptions:
  - Software engineering is not only coding fast; it also requires communication, design judgment, and maintainability.
alternative_paths:
  - career_path.product_manager
  - career_path.data_analyst
canadian_context:
