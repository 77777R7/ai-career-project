summary: Policy analysts research public issues, compare evidence, understand stakeholders, and write recommendations for organizations or governments.
related_majors:
  - International Relations
  - Political Science
  - Economics
  - Public Policy
  - Statistics
daily_tasks:
  - Research policy problems and evidence.
  - Summarize official sources and stakeholder perspectives.
  - Compare policy options and tradeoffs.
  - Write briefs, memos, or recommendations.
best_fit_for:
  - Students who enjoy social issues, research, writing, and evidence.
  - Students interested in government, nonprofits, public affairs, or international topics.
  - Students who like explaining tradeoffs rather than only building products.
common_challenges:
  - Students need writing samples and evidence of research judgment.
  - Policy questions can be complex and politically sensitive.
reflection_questions:
  - Do you enjoy reading sources and turning them into a clear recommendation?
  - Are you comfortable explaining uncertainty and tradeoffs?
support_strategies:
  - Start with a short policy brief using official Canadian sources.
required_skills:
  - skill.policy_research
  - skill.data_storytelling
  - skill.excel
recommended_courses:
  - Public policy
  - Economics
  - Statistics
  - International relations
high_school_preparation:
  - Practice comparing public issues using credible sources.
  - Join debate, Model UN, student government, or social impact clubs.
university_preparation:
  - Write one evidence-backed policy brief.
  - Learn to cite official sources and separate claims from recommendations.
entry_level_roles:
  - Policy Analyst Intern
  - Research Assistant
  - Public Affairs Intern
  - Program Analyst Intern
internship_keywords:
  - policy analyst intern
  - research assistant
  - public policy intern
  - program analyst intern
