related_metric_ids:
  - metric.project_readiness
ai_support_prompt: Help the student compare dataset options and check whether they fit the research question. Do not fabricate dataset contents.
source_ids:
  - source.statcan_open_license
  - source.vancouver_open_data
risk_level: low
review_status: unreviewed
content_maturity: seed
visibility: student_visible
ai_usage:
  used_by:
    - roadmap_generator
    - project_builder
    - advisor_chat
    - dashboard_scoring
  prompt_fields:
    - title
    - description
    - completion_criteria
    - ai_support_prompt
  display_fields:
    - title
    - description
    - estimated_time
    - completion_criteria
  retrieval_priority: medium
  allowed_response_modes:
    - explain
    - recommend
  restricted_response_modes:
    - fabricate_results
  user_visible: true
