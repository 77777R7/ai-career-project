id: action.select_dataset
title: Select a dataset for your project
description: Choose a public dataset that can help answer the project research question.
action_type: project_step
status: active
version: 1.0.0
locale: en-CA
country: Canada
province: BC
audience:
  - university_student
  - international_student
student_stage:
  - university_beginner
  - university_mid
career_path_ids:
  - career_path.data_analyst
  - career_path.business_analyst
skill_ids:
  - skill.spreadsheet_basics
  - skill.data_storytelling
estimated_time: 45 minutes
difficulty: beginner
prerequisites:
  - action.define_project_question
completion_criteria:
  - Student selects at least one relevant public dataset.
  - Student records the source URL and why the dataset is useful.
