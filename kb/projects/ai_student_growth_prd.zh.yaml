project_goal: Write a concise product requirements document for an AI student growth feature, showing user problem framing, product scope, success metrics, and tradeoffs.
final_outputs:
  - problem_statement
  - user_story
  - feature_scope
  - success_metrics
  - prd
steps:
  - step_number: 1
    title: Define the user problem
    objective: Choose one student planning problem and write a focused product question.
    estimated_time: 30 minutes
    required_tools:
      - Google Docs
    input_needed:
      - target_user
      - student_pain_point
    instructions:
      - Pick one target user, such as a first-year university explorer.
      - Write the user's current problem in plain language.
      - Avoid jumping into features before defining the problem.
    expected_output:
      type: text
      description: A 3-5 sentence problem statement and one user story.
    completion_checklist:
      - Target user is specific.
      - Problem is clear.
      - User story explains the desired outcome.
    ai_help_prompt: Help the student sharpen the problem statement without inventing user research.
    review_rubric:
      clarity: 0-3
      user_specificity: 0-3
      feasibility: 0-3
    common_mistakes:
      - Starting with features instead of user problems.
      - Defining a user group too broadly.
    next_step_trigger: After the problem is clear, help the student define feature scope and success metrics.
    related_action_id: action.define_project_question
    related_metric_ids:
      - metric.project_readiness
rubric:
  project_fit:
    description: The project should show product thinking and clear tradeoffs.
  evidence_quality:
    description: The PRD should make the student's reasoning visible.
